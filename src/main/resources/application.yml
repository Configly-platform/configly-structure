spring:
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://localhost:5432/configly_structure
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  application:
    name: configly-structure
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/auth/realms/configly

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([${spring.application.name:-app}]){green} %clr([%X{correlationId:--}]){yellow} %clr([%X{actor:--}]){cyan} %clr(%-5level) -> %msg%n"

outbox:
  batch-size: 100
  pool-interval-ms: 10s
  initial-delay-ms: 0s
  attempt-limit: 3
  kafka:
    enabled: true
    bootstrap-servers: localhost:9092
    client-id: configly-structure-client
    topics:
      - name: configly-structure-events
        partitions: 3
        replication-factor: 1
    props:
      spring.json.add.type.headers: true

server:
  port: 8081

